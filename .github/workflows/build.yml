name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event_name != 'workflow_dispatch' }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Find APK files
        id: find_apk
        run: |
          echo "=== Generated APKs ==="
          find app/build -name "*.apk" -type f
          DEBUG_APK=$(find app/build -name "*-debug.apk" -type f | head -1)
          RELEASE_APK=$(find app/build -name "*-release-unsigned.apk" -o -name "*-release.apk" | head -1)

          if [ -n "$DEBUG_APK" ]; then
            echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
            echo "debug_name=$(basename "$DEBUG_APK")" >> $GITHUB_OUTPUT
          fi
          if [ -n "$RELEASE_APK" ]; then
            echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
            echo "release_name=$(basename "$RELEASE_APK")" >> $GITHUB_OUTPUT
          fi

      - name: Upload Debug APK
        if: steps.find_apk.outputs.debug_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: SimpleMusic-Debug
          path: ${{ steps.find_apk.outputs.debug_apk }}
          retention-days: 30

      - name: Upload Release APK
        if: steps.find_apk.outputs.release_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: SimpleMusic-Release
          path: ${{ steps.find_apk.outputs.release_apk }}
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.find_apk.outputs.release_apk != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.release_apk }}
          generate_release_notes: true
